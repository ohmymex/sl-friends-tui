# Second Life session token (from browser cookies)
# How to get: login to secondlife.com → F12 → Application → Cookies → session-token
token: ""
token_encoded: false

# Display settings
filter: "online"            # online | offline | all
refresh: 5s
show_internal_names: false
show_lindens: true
show_groups: true
layout: "dashboard"

# Notifications — get alerted when specific friends come online
notify:
  enabled: false
  users: []                 # e.g. ["alice.doe", "bob.smith"]

  # ntfy.sh — push notifications to your phone
  # Setup: install ntfy app, subscribe to your topic name
  ntfy:
    enabled: false
    server: "https://ntfy.sh"
    topic: ""               # pick something random, e.g. "sl-friends-a8f3x9"
    token: ""               # optional, for authenticated topics
    priority: 3             # 1=min, 3=default, 5=urgent
